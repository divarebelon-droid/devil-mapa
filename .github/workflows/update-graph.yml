name: Atualizar DEVIL Mapa

on:
  schedule:
    # A cada 6 horas: 00h, 06h, 12h, 18h UTC = 21h, 03h, 09h, 15h BRT
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch: # botão manual no GitHub

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Coletar dados do ClickUp
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: node collector.js

      - name: Commitar se mudou
        run: |
          git config user.name "DEVIL Bot"
          git config user.email "divarebel.on@gmail.com"
          git add graph-data.json
          if git diff --cached --quiet; then
            echo "Sem mudancas nos dados."
          else
            git commit -m "data: atualizar grafo $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]"
            git pull --rebase origin main
            git push
          fi
