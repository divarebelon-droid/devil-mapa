name: Atualizar DEVIL Mapa

on:
  schedule:
    # 6h e 18h de Brasília (UTC-3) = 9h e 21h UTC
    - cron: '0 9,21 * * *'
  workflow_dispatch: # botão manual no GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Atualizar dados ClickUp
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
        run: node update-data.js

      - name: Commitar se mudou
        run: |
          git config user.name "DEVIL Bot"
          git config user.email "divarebel.on@gmail.com"
          git add graph-data.json
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados."
          else
            git commit -m "data: atualizar grafo $(date -u +'%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin main
            git push
          fi
