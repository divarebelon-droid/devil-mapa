<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVIL — Grafo de Conhecimento</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0e0e0e;
    color: #dcdad9;
    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── Header ── */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 50px;
    background: rgba(14,14,14,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    align-items: center;
    padding: 0 20px;
    gap: 16px;
    z-index: 100;
  }

  #header .logo {
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    color: #c0392b;
    text-transform: uppercase;
  }

  #header .separator { color: #333; }

  #header .subtitle {
    font-size: 12px;
    color: #666;
    letter-spacing: 1px;
  }

  #header .stats {
    margin-left: auto;
    font-size: 11px;
    color: #555;
    display: flex;
    gap: 16px;
  }

  #header .stat-item span { color: #888; }

  /* ── Filtros ── */
  #filters {
    position: fixed;
    top: 58px;
    left: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 100;
  }

  .filter-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px 6px 8px;
    border-radius: 6px;
    border: 1px solid #2a2a2a;
    background: rgba(20,20,20,0.9);
    cursor: pointer;
    font-size: 11px;
    color: #aaa;
    transition: all 0.15s;
    user-select: none;
  }

  .filter-btn:hover { border-color: #444; color: #ddd; }
  .filter-btn.active { border-color: #555; color: #fff; background: rgba(35,35,35,0.95); }

  .filter-dot {
    width: 10px; height: 10px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  /* ── Grafo ── */
  #graph {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
  }

  svg { width: 100%; height: 100%; }

  .link {
    stroke: #2a2a2a;
    stroke-width: 1.5;
    stroke-opacity: 0.6;
    transition: stroke 0.2s, stroke-opacity 0.2s;
  }

  .link.highlighted {
    stroke: #555;
    stroke-opacity: 1;
    stroke-width: 2;
  }

  .node-group { cursor: pointer; }

  .node-circle {
    transition: r 0.2s ease, filter 0.2s ease;
  }

  .node-label {
    font-size: 10px;
    fill: #666;
    pointer-events: none;
    text-anchor: middle;
    dominant-baseline: middle;
    transition: fill 0.2s;
  }

  .node-group:hover .node-label { fill: #bbb; }

  /* ── Painel lateral ── */
  #panel {
    position: fixed;
    top: 50px; right: 0; bottom: 0;
    width: 360px;
    background: rgba(12,12,12,0.97);
    border-left: 1px solid #222;
    transform: translateX(100%);
    transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
    z-index: 200;
    display: flex;
    flex-direction: column;
  }

  #panel.open { transform: translateX(0); }

  #panel.floating {
    border: 1px solid #333;
    border-radius: 12px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 0 1px rgba(255,255,255,0.05);
    bottom: auto;
    right: auto;
    height: 520px;
    transform: none !important;
    transition: none !important;
  }

  #panel-drag-handle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 3px;
    padding: 6px 0 2px;
    cursor: grab;
    opacity: 0.35;
    transition: opacity 0.2s;
  }
  #panel-drag-handle:hover { opacity: 0.7; }
  #panel-drag-handle:active { cursor: grabbing; opacity: 1; }
  #panel-drag-handle span {
    display: block;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: #888;
  }

  #panel-header {
    padding: 16px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-shrink: 0;
  }

  #panel-icon {
    width: 36px; height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
  }

  #panel-meta { flex: 1; min-width: 0; }

  #panel-title {
    font-size: 13px;
    font-weight: 600;
    color: #e0dedd;
    line-height: 1.4;
    margin-bottom: 4px;
  }

  #panel-type {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #555;
  }

  #panel-date {
    font-size: 10px;
    color: #444;
    margin-top: 2px;
  }

  #panel-close {
    background: none;
    border: none;
    color: #444;
    font-size: 18px;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
    flex-shrink: 0;
    transition: color 0.15s;
  }

  #panel-close:hover { color: #888; }

  #panel-tags {
    padding: 10px 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
  }

  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid #2a2a2a;
    color: #555;
  }

  #panel-body {
    padding: 16px;
    overflow-y: auto;
    flex: 1;
    font-size: 12px;
    line-height: 1.8;
    color: #888;
  }

  #panel-body h1, #panel-body h2, #panel-body h3 {
    color: #ccc;
    font-size: 13px;
    font-weight: 600;
    margin: 12px 0 6px;
  }

  #panel-body strong { color: #bbb; font-weight: 600; }
  #panel-body p { margin-bottom: 8px; }

  /* ── Tooltip ── */
  #tooltip {
    position: fixed;
    pointer-events: none;
    background: rgba(20,20,20,0.95);
    border: 1px solid #333;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 11px;
    color: #ccc;
    z-index: 300;
    display: none;
    max-width: 200px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

  /* ── Botão refresh ── */
  #btn-refresh {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: rgba(20,20,20,0.9);
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 11px;
    color: #666;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  #btn-refresh:hover { border-color: #444; color: #aaa; }

  /* ── Busca ── */
  #search-wrap {
    position: relative;
  }

  #search-input {
    background: rgba(30,30,30,0.95);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 6px 12px 6px 32px;
    font-size: 12px;
    color: #ccc;
    width: 220px;
    outline: none;
    transition: border-color 0.15s, width 0.2s;
  }

  #search-input::placeholder { color: #444; }
  #search-input:focus { border-color: #555; width: 260px; }

  #search-icon {
    position: absolute;
    left: 10px;
    top: 50%;
    transform: translateY(-50%);
    color: #444;
    font-size: 13px;
    pointer-events: none;
  }

  #search-results {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    background: rgba(18,18,18,0.98);
    border: 1px solid #333;
    border-radius: 8px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    overflow: hidden;
    z-index: 500;
    display: none;
    max-height: 360px;
    overflow-y: auto;
  }

  #search-results.visible { display: block; }

  .search-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 14px;
    cursor: pointer;
    border-bottom: 1px solid #1e1e1e;
    transition: background 0.1s;
  }

  .search-item:last-child { border-bottom: none; }
  .search-item:hover { background: rgba(255,255,255,0.04); }

  .search-item-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .search-item-title {
    font-size: 12px;
    color: #bbb;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .search-item-type {
    font-size: 10px;
    color: #444;
    flex-shrink: 0;
  }

  .search-empty {
    padding: 14px;
    font-size: 12px;
    color: #444;
    text-align: center;
  }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <span class="logo">Diva Rebel.On</span>
  <span class="separator">|</span>
  <span class="subtitle">Grafo de Conhecimento</span>
  <div id="search-wrap">
    <span id="search-icon">⌕</span>
    <input id="search-input" type="text" placeholder="Buscar por nome, tema, cliente…" autocomplete="off"
      oninput="onSearch(this.value)" onfocus="onSearchFocus()" onblur="onSearchBlur()">
    <div id="search-results"></div>
  </div>
  <div class="stats">
    <div class="stat-item"><span id="stat-nodes">0</span> eventos</div>
    <div class="stat-item"><span id="stat-links">0</span> conexões</div>
    <div class="stat-item" id="stat-date" style="color:#c0392b"></div>
  </div>
</div>

<!-- Filtros -->
<div id="filters">
  <div class="filter-btn active" data-type="all" onclick="toggleFilter(this)">
    <div class="filter-dot" style="background:#555;border-radius:50%"></div>
    Todos
  </div>
  <div class="filter-btn active" data-type="meeting" onclick="toggleFilter(this)">
    <div class="filter-dot" style="background:#9b59b6"></div>
    Reuniões
  </div>
  <div class="filter-btn active" data-type="instagram" onclick="toggleFilter(this)">
    <div class="filter-dot" style="background:#e1306c"></div>
    Instagram
  </div>
  <div class="filter-btn active" data-type="whatsapp" onclick="toggleFilter(this)">
    <div class="filter-dot" style="background:#25d366"></div>
    WhatsApp
  </div>
  <div class="filter-btn active" data-type="clickup" onclick="toggleFilter(this)">
    <div class="filter-dot" style="background:#7b68ee"></div>
    ClickUp
  </div>
  <div class="filter-btn active" data-type="content" onclick="toggleFilter(this)">
    <div class="filter-dot" style="background:#f39c12"></div>
    Conteúdo
  </div>
</div>

<!-- Grafo SVG -->
<div id="graph">
  <svg id="svg"></svg>
</div>

<!-- Tooltip -->
<div id="tooltip"></div>

<!-- Painel lateral -->
<div id="panel">
  <div id="panel-drag-handle">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>
  <div id="panel-header">
    <div id="panel-icon"></div>
    <div id="panel-meta">
      <div id="panel-title">—</div>
      <div id="panel-type">—</div>
      <div id="panel-date">—</div>
    </div>
    <button id="panel-close" onclick="closePanel()">✕</button>
  </div>
  <div id="panel-tags"></div>
  <div id="panel-body"></div>
</div>

<!-- Refresh -->
<button id="btn-refresh" onclick="refreshData()">↻ Recarregar</button>
<div style="position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:10px;color:#333;letter-spacing:1px;z-index:10">DEVIL MAPA — CENTRO DE COMANDO IA</div>

<script>
// ── Configuração de cores e ícones por tipo ─────────────────────────
const TIPOS = {
  meeting: {
    cor: '#9b59b6',
    bgPanel: 'rgba(155,89,182,0.15)',
    label: 'Reunião',
    radius: 22,
    svg: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
      <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>`,
    icon: (size) => iconMeeting(size),
  },
  instagram: {
    cor: '#e1306c',
    bgPanel: 'rgba(225,48,108,0.12)',
    label: 'Instagram',
    radius: 20,
    icon: (size) => iconInstagram(size),
  },
  whatsapp: {
    cor: '#25d366',
    bgPanel: 'rgba(37,211,102,0.1)',
    label: 'WhatsApp',
    radius: 18,
    icon: (size) => iconWhatsApp(size),
  },
  clickup: {
    cor: '#7b68ee',
    bgPanel: 'rgba(123,104,238,0.12)',
    label: 'ClickUp',
    radius: 19,
    icon: (size) => iconClickUp(size),
  },
  content: {
    cor: '#f39c12',
    bgPanel: 'rgba(243,156,18,0.1)',
    label: 'Conteúdo',
    radius: 17,
    icon: (size) => iconContent(size),
  },
};

// ── Ícones SVG inline por tipo ───────────────────────────────────────
function iconMeeting(s) {
  return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
    <line x1="16" y1="2" x2="16" y2="6"/>
    <line x1="8" y1="2" x2="8" y2="6"/>
    <line x1="3" y1="10" x2="21" y2="10"/>
  </svg>`;
}

function iconInstagram(s) {
  return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
    <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
    <circle cx="12" cy="12" r="4"/>
    <circle cx="17.5" cy="6.5" r="0.5" fill="white" stroke="none"/>
  </svg>`;
}

function iconWhatsApp(s) {
  return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="white">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
  </svg>`;
}

function iconClickUp(s) {
  return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
  </svg>`;
}

function iconContent(s) {
  return `<svg viewBox="0 0 24 24" width="${s}" height="${s}" fill="none" stroke="white" stroke-width="2" stroke-linecap="round">
    <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
  </svg>`;
}

// ── Estado ───────────────────────────────────────────────────────────
let allNodes = [], allLinks = [];
let activeFilters = new Set(['meeting','instagram','whatsapp','clickup','content']);
let simulation, svgEl, linkSel, nodeSel, zoomBehavior;

// ── Carregar dados ───────────────────────────────────────────────────
async function loadData() {
  try {
    const resp = await fetch('./graph-data.json?v=' + Date.now());
    const data = await resp.json();
    allNodes = data.nodes || [];
    allLinks = data.links || [];

    document.getElementById('stat-nodes').textContent = allNodes.length;
    document.getElementById('stat-links').textContent = allLinks.length;

    const hoje = new Date().toLocaleDateString('pt-BR', { day:'2-digit', month:'short' });
    document.getElementById('stat-date').textContent = hoje;

    renderGraph();
  } catch(e) {
    console.error('Erro ao carregar dados:', e);
    // Renderiza com dados mínimos de exemplo
    allNodes = [
      { id:'demo1', type:'meeting', titulo:'Carregando dados...', data: new Date().toISOString().split('T')[0], conteudo: 'Inicie o servidor e tente novamente.', tags:[], links:[] },
    ];
    allLinks = [];
    renderGraph();
  }
}

// ── Filtros ──────────────────────────────────────────────────────────
function toggleFilter(btn) {
  const type = btn.dataset.type;
  if (type === 'all') {
    const shouldActivate = activeFilters.size < Object.keys(TIPOS).length;
    if (shouldActivate) {
      activeFilters = new Set(Object.keys(TIPOS));
    } else {
      activeFilters.clear();
    }
    document.querySelectorAll('.filter-btn:not([data-type="all"])').forEach(b => {
      b.classList.toggle('active', shouldActivate);
    });
  } else {
    if (activeFilters.has(type)) {
      activeFilters.delete(type);
      btn.classList.remove('active');
    } else {
      activeFilters.add(type);
      btn.classList.add('active');
    }
    const allBtn = document.querySelector('[data-type="all"]');
    allBtn.classList.toggle('active', activeFilters.size === Object.keys(TIPOS).length);
  }
  updateVisibility();
}

function updateVisibility() {
  if (!nodeSel || !linkSel) return;

  nodeSel.attr('opacity', d => activeFilters.has(d.type) ? 1 : 0.08);

  // IDs dos nós visíveis
  const visibleIds = new Set(allNodes.filter(n => activeFilters.has(n.type)).map(n => n.id));
  linkSel.attr('opacity', d => {
    const src = typeof d.source === 'object' ? d.source.id : d.source;
    const tgt = typeof d.target === 'object' ? d.target.id : d.target;
    return (visibleIds.has(src) && visibleIds.has(tgt)) ? 0.6 : 0.04;
  });
}

// ── Render principal ─────────────────────────────────────────────────
function renderGraph() {
  const svg = d3.select('#svg');
  svg.selectAll('*').remove();

  const W = window.innerWidth;
  const H = window.innerHeight;

  // Defs — gradientes e filtros de glow
  const defs = svg.append('defs');

  // Gradiente Instagram
  const igGrad = defs.append('radialGradient').attr('id','grad-instagram');
  igGrad.append('stop').attr('offset','0%').attr('stop-color','#f77737');
  igGrad.append('stop').attr('offset','50%').attr('stop-color','#e1306c');
  igGrad.append('stop').attr('offset','100%').attr('stop-color','#833ab4');

  // Glow filter
  Object.entries(TIPOS).forEach(([type, cfg]) => {
    const filter = defs.append('filter').attr('id',`glow-${type}`);
    filter.append('feGaussianBlur').attr('stdDeviation','4').attr('result','coloredBlur');
    const merge = filter.append('feMerge');
    merge.append('feMergeNode').attr('in','coloredBlur');
    merge.append('feMergeNode').attr('in','SourceGraphic');
  });

  // Container com zoom
  const container = svg.append('g').attr('id','container');

  zoomBehavior = d3.zoom()
    .scaleExtent([0.15, 4])
    .on('zoom', e => container.attr('transform', e.transform));
  svg.call(zoomBehavior);

  // Prepara links (deep copy para não mutar allLinks)
  const nodes = allNodes.map(d => ({...d}));
  const nodeById = new Map(nodes.map(n => [n.id, n]));
  const links = allLinks
    .filter(l => nodeById.has(l.source) && nodeById.has(l.target))
    .map(l => ({...l, source: l.source, target: l.target}));

  // Posição de cluster por perfil + tipo (layout duas empresas)
  function clusterPos(d) {
    const isOficina = d.perfil === 'oficina_dro' || (d.type === 'whatsapp' && d.status === 'followup');
    if (d.type === 'meeting')    return isOficina ? { x:0.20, y:0.30 } : { x:0.80, y:0.30 };
    if (d.type === 'clickup')    return isOficina ? { x:0.22, y:0.60 } : { x:0.78, y:0.60 };
    if (d.type === 'whatsapp')   return d.status === 'followup' ? { x:0.12, y:0.72 } : { x:0.88, y:0.72 };
    if (d.type === 'instagram')  return { x:0.50, y:0.82 };
    if (d.type === 'content')    return { x:0.50, y:0.35 };
    return { x:0.50, y:0.50 };
  }

  // Força
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d => d.id).distance(90).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-200))
    .force('collision', d3.forceCollide(d => (TIPOS[d.type]?.radius || 18) + 12))
    .force('cluster-x', d3.forceX(d => W * (clusterPos(d).x)).strength(0.16))
    .force('cluster-y', d3.forceY(d => H * (clusterPos(d).y)).strength(0.16));

  // ── Zonas de empresa (fundo) ──────────────────────────────────────
  const zonaG = container.append('g').attr('class','zonas');

  // Zona Oficina Dro (esquerda)
  zonaG.append('rect')
    .attr('x', 0).attr('y', 0)
    .attr('width', W * 0.47).attr('height', H)
    .attr('fill', '#c0392b05')
    .attr('stroke', '#c0392b12').attr('stroke-width', 1);

  // Separador central
  zonaG.append('line')
    .attr('x1', W*0.5).attr('y1', 50)
    .attr('x2', W*0.5).attr('y2', H)
    .attr('stroke', '#ffffff08').attr('stroke-width', 1)
    .attr('stroke-dasharray', '6 8');

  // Zona Diva Rebel (direita)
  zonaG.append('rect')
    .attr('x', W * 0.53).attr('y', 0)
    .attr('width', W * 0.47).attr('height', H)
    .attr('fill', '#9b59b605')
    .attr('stroke', '#9b59b612').attr('stroke-width', 1);

  // Labels das empresas
  zonaG.append('text')
    .attr('x', W * 0.23).attr('y', 80)
    .attr('text-anchor', 'middle')
    .attr('fill', '#c0392b40')
    .attr('font-size', '13px')
    .attr('letter-spacing', '4px')
    .attr('font-weight', '700')
    .text('OFICINA DRO');

  zonaG.append('text')
    .attr('x', W * 0.23).attr('y', 96)
    .attr('text-anchor', 'middle')
    .attr('fill', '#c0392b28')
    .attr('font-size', '10px')
    .attr('letter-spacing', '2px')
    .text('clientes · nutricionistas');

  zonaG.append('text')
    .attr('x', W * 0.77).attr('y', 80)
    .attr('text-anchor', 'middle')
    .attr('fill', '#9b59b640')
    .attr('font-size', '13px')
    .attr('letter-spacing', '4px')
    .attr('font-weight', '700')
    .text('DIVA REBEL');

  zonaG.append('text')
    .attr('x', W * 0.77).attr('y', 96)
    .attr('text-anchor', 'middle')
    .attr('fill', '#9b59b628')
    .attr('font-size', '10px')
    .attr('letter-spacing', '2px')
    .text('social medias · educação');

  // ── Rótulos de sub-setor (círculos tracejados) ────────────────────
  const SETOR_LABELS = [
    // OFICINA
    { type:'meeting',   label:'Reuniões',    x:0.20, y:0.30 },
    { type:'clickup',   label:'ClickUp',     x:0.22, y:0.60 },
    { type:'whatsapp',  label:'Atendimento', x:0.12, y:0.72 },
    // DIVA REBEL
    { type:'meeting',   label:'Aulas',       x:0.80, y:0.30 },
    { type:'clickup',   label:'ClickUp',     x:0.78, y:0.60 },
    { type:'whatsapp',  label:'Prospecção',  x:0.88, y:0.72 },
    // CENTRO
    { type:'instagram', label:'Instagram',   x:0.50, y:0.82 },
  ];

  const setorG = container.append('g').attr('class','setores');
  SETOR_LABELS.forEach(s => {
    const cfg = TIPOS[s.type];
    setorG.append('circle')
      .attr('cx', W * s.x).attr('cy', H * s.y)
      .attr('r', 90)
      .attr('fill', (cfg?.cor || '#555') + '07')
      .attr('stroke', (cfg?.cor || '#555') + '20')
      .attr('stroke-width', 1)
      .attr('stroke-dasharray', '4 5');
    setorG.append('text')
      .attr('x', W * s.x).attr('y', H * s.y - 76)
      .attr('text-anchor', 'middle')
      .attr('fill', (cfg?.cor || '#555') + '50')
      .attr('font-size', '10px')
      .attr('letter-spacing', '2px')
      .attr('font-weight', '600')
      .text(s.label.toUpperCase());
  });

  // Links — cor por tipo
  const COR_LINK = { pessoa: '#4a4a4a', sequencia: '#3a3a6a', conteudo: '#5a4a2a' };

  linkSel = container.append('g').selectAll('.link')
    .data(links).join('line')
    .attr('class','link')
    .attr('stroke', d => COR_LINK[d.tipo] || '#2a2a2a');

  // Nós
  const nodeGroups = container.append('g').selectAll('.node-group')
    .data(nodes).join('g')
    .attr('class','node-group')
    .call(d3.drag()
      .on('start', (e,d) => { if(!e.active) simulation.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag',  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on('end',   (e,d) => { if(!e.active) simulation.alphaTarget(0); d.fx=null; d.fy=null; })
    )
    .on('click', (e, d) => { e.stopPropagation(); openPanel(d); highlightNode(d); })
    .on('mouseenter', (e, d) => showTooltip(e, d))
    .on('mousemove',  (e) => moveTooltip(e))
    .on('mouseleave', () => hideTooltip());

  nodeSel = nodeGroups;

  // Círculo de fundo (glow)
  nodeGroups.append('circle')
    .attr('r', d => (TIPOS[d.type]?.radius || 18) + 6)
    .attr('fill', d => (TIPOS[d.type]?.cor || '#666') + '18')
    .attr('class', 'node-glow');

  // Círculo principal
  nodeGroups.append('circle')
    .attr('class', 'node-circle')
    .attr('r', d => TIPOS[d.type]?.radius || 18)
    .attr('fill', d => d.type === 'instagram' ? 'url(#grad-instagram)' : (TIPOS[d.type]?.cor || '#666'))
    .attr('stroke', '#0e0e0e')
    .attr('stroke-width', 2);

  // Ícone SVG via foreignObject
  nodeGroups.each(function(d) {
    const r = TIPOS[d.type]?.radius || 18;
    const iconSize = Math.floor(r * 0.85);
    const fo = d3.select(this).append('foreignObject')
      .attr('width', iconSize)
      .attr('height', iconSize)
      .attr('x', -iconSize/2)
      .attr('y', -iconSize/2)
      .style('pointer-events','none');

    const div = fo.append('xhtml:div')
      .style('width','100%')
      .style('height','100%')
      .style('display','flex')
      .style('align-items','center')
      .style('justify-content','center')
      .style('opacity','0.9');

    const iconFn = TIPOS[d.type]?.icon;
    if (iconFn) div.html(iconFn(iconSize * 0.7));
  });

  // Label abaixo do nó (WhatsApp sem nome por privacidade)
  nodeGroups.append('text')
    .attr('class','node-label')
    .attr('y', d => (TIPOS[d.type]?.radius || 18) + 12)
    .text(d => d.type === 'whatsapp' ? '' : truncate(d.titulo, 22));

  // Hover: cresce
  nodeGroups
    .on('mouseenter.scale', function(e, d) {
      d3.select(this).select('.node-circle')
        .transition().duration(150)
        .attr('r', (TIPOS[d.type]?.radius || 18) * 1.35)
        .attr('filter', `url(#glow-${d.type})`);
      d3.select(this).select('.node-glow')
        .transition().duration(150)
        .attr('r', (TIPOS[d.type]?.radius || 18) * 1.6);
      d3.select(this).select('.node-label')
        .transition().duration(150).attr('fill','#ddd');
    })
    .on('mouseleave.scale', function(e, d) {
      d3.select(this).select('.node-circle')
        .transition().duration(200)
        .attr('r', TIPOS[d.type]?.radius || 18)
        .attr('filter', null);
      d3.select(this).select('.node-glow')
        .transition().duration(200)
        .attr('r', (TIPOS[d.type]?.radius || 18) + 6);
      d3.select(this).select('.node-label')
        .transition().duration(200).attr('fill','#666');
    });

  // Clique no fundo: deseleciona
  svg.on('click', () => { closePanel(); clearHighlight(); });

  // Tick
  simulation.on('tick', () => {
    linkSel
      .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    nodeGroups.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  updateVisibility();
}

// ── Highlight ao clicar ──────────────────────────────────────────────
function highlightNode(selected) {
  if (!nodeSel || !linkSel) return;
  const links = linkSel.data();
  const connectedIds = new Set([selected.id]);
  links.forEach(l => {
    const s = typeof l.source === 'object' ? l.source.id : l.source;
    const t = typeof l.target === 'object' ? l.target.id : l.target;
    if (s === selected.id) connectedIds.add(t);
    if (t === selected.id) connectedIds.add(s);
  });

  nodeSel.attr('opacity', d => connectedIds.has(d.id) ? 1 : 0.2);

  linkSel.classed('highlighted', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return s === selected.id || t === selected.id;
  }).attr('stroke-opacity', d => {
    const s = typeof d.source === 'object' ? d.source.id : d.source;
    const t = typeof d.target === 'object' ? d.target.id : d.target;
    return (s === selected.id || t === selected.id) ? 1 : 0.05;
  });
}

function clearHighlight() {
  if (!nodeSel || !linkSel) return;
  nodeSel.attr('opacity', d => activeFilters.has(d.type) ? 1 : 0.08);
  linkSel.classed('highlighted', false).attr('stroke-opacity', 0.6);
}

// ── Painel lateral ───────────────────────────────────────────────────
function openPanel(d) {
  const cfg = TIPOS[d.type] || { cor:'#555', label:'Evento', bgPanel:'rgba(80,80,80,0.1)', icon: () => '' };

  document.getElementById('panel-icon').innerHTML = cfg.icon ? cfg.icon(22) : '';
  document.getElementById('panel-icon').style.background = cfg.bgPanel;
  document.getElementById('panel-icon').style.color = cfg.cor;

  // WhatsApp: título genérico no header do painel (nome fica no corpo)
  const panelTitle = d.type === 'whatsapp'
    ? `WhatsApp ${d.status === 'followup' ? 'Follow-up' : 'Prospecção'}`
    : d.titulo;
  document.getElementById('panel-title').textContent = panelTitle;
  document.getElementById('panel-type').textContent = cfg.label;
  document.getElementById('panel-date').textContent = formatDate(d.data);

  const tagsEl = document.getElementById('panel-tags');
  tagsEl.innerHTML = (d.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

  // Renderiza markdown simples
  document.getElementById('panel-body').innerHTML = markdownToHtml(d.conteudo || '');

  document.getElementById('panel').classList.add('open');
}

function closePanel() {
  const panel = document.getElementById('panel');
  panel.classList.remove('open');
  panel.classList.remove('floating');
  panel.style.left = '';
  panel.style.top = '';
}

// ── Painel arrastável ────────────────────────────────────────────────
(function() {
  let dragging = false, startX, startY, startLeft, startTop;

  const handle = document.getElementById('panel-drag-handle');

  handle.addEventListener('mousedown', e => {
    const panel = document.getElementById('panel');
    if (!panel.classList.contains('open')) return;

    // Se ainda não é flutuante, captura posição atual e muda para floating
    if (!panel.classList.contains('floating')) {
      const rect = panel.getBoundingClientRect();
      panel.style.left = rect.left + 'px';
      panel.style.top  = rect.top  + 'px';
      panel.classList.add('floating');
    }

    dragging = true;
    startX = e.clientX;
    startY = e.clientY;
    startLeft = parseInt(panel.style.left) || 0;
    startTop  = parseInt(panel.style.top)  || 0;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const panel = document.getElementById('panel');
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    let newLeft = startLeft + dx;
    let newTop  = startTop  + dy;
    // Limita dentro da tela
    newLeft = Math.max(0, Math.min(window.innerWidth  - panel.offsetWidth,  newLeft));
    newTop  = Math.max(0, Math.min(window.innerHeight - panel.offsetHeight, newTop));
    panel.style.left = newLeft + 'px';
    panel.style.top  = newTop  + 'px';
  });

  document.addEventListener('mouseup', () => { dragging = false; });
})();

// ── Tooltip ──────────────────────────────────────────────────────────
function showTooltip(e, d) {
  const tt = document.getElementById('tooltip');
  const cfg = TIPOS[d.type] || { label:'Evento' };
  // WhatsApp: não expõe nome no hover — só o tipo e data
  const nome = d.type === 'whatsapp'
    ? `<br><span style="color:#444">${d.status === 'followup' ? 'Follow-up' : 'Prospecção'} · ${d.data}</span>`
    : `<br>${d.titulo}`;
  tt.innerHTML = `<strong style="color:${cfg.cor}">${cfg.label}</strong>${nome}`;
  tt.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = document.getElementById('tooltip');
  const x = e.clientX + 14;
  const y = e.clientY - 10;
  tt.style.left = Math.min(x, window.innerWidth - 220) + 'px';
  tt.style.top  = Math.max(y, 10) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ── Utilitários ──────────────────────────────────────────────────────
function truncate(str, n) {
  if (!str) return '';
  return str.length > n ? str.slice(0, n-1) + '…' : str;
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    const [y,m,d] = iso.split('-');
    const meses = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return `${d} ${meses[parseInt(m)-1]} ${y}`;
  } catch(_) { return iso; }
}

function markdownToHtml(md) {
  if (!md) return '';
  const lines = md.split('\n');
  let html = '';
  let inList = false;

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Headings
    if (/^### (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h4 style="color:#c9a0e8;margin:14px 0 6px;font-size:13px;text-transform:uppercase;letter-spacing:.5px">${line.replace(/^### /, '')}</h4>`;
      continue;
    }
    if (/^## (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h3 style="color:#dcdad9;margin:16px 0 8px;font-size:15px;border-bottom:1px solid rgba(255,255,255,0.1);padding-bottom:4px">${line.replace(/^## /, '')}</h3>`;
      continue;
    }
    if (/^# (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<h2 style="color:#fff;margin:0 0 10px;font-size:17px">${line.replace(/^# /, '')}</h2>`;
      continue;
    }

    // Listas com marcador
    if (/^[-*] (.+)/.test(line)) {
      if (!inList) { html += '<ul style="margin:4px 0 8px 16px;padding:0">'; inList = true; }
      const item = line.replace(/^[-*] /, '');
      html += `<li style="margin-bottom:4px">${formatInline(item)}</li>`;
      continue;
    }

    // Listas numeradas
    if (/^\d+\. (.+)/.test(line)) {
      if (inList) { html += '</ul>'; inList = false; }
      html += `<div style="margin-bottom:4px;padding-left:4px">${formatInline(line)}</div>`;
      continue;
    }

    // Linha vazia
    if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
      html += '<div style="height:8px"></div>';
      continue;
    }

    // Parágrafo normal
    if (inList) { html += '</ul>'; inList = false; }
    html += `<p style="margin:0 0 6px;line-height:1.6">${formatInline(line)}</p>`;
  }

  if (inList) html += '</ul>';
  return html;
}

function formatInline(text) {
  return text
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:#c9a0e8;text-decoration:underline">$1</a>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em style="color:#bbb">$1</em>')
    .replace(/_(.+?)_/g, '<em style="color:#bbb">$1</em>');
}

async function refreshData() {
  window.location.reload();
}

// ── Busca ────────────────────────────────────────────────────────────
let searchBlurTimer = null;

function onSearch(query) {
  const box = document.getElementById('search-results');
  const q = query.trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
  if (q.length < 2) { box.classList.remove('visible'); box.innerHTML = ''; return; }

  // Busca em titulo, conteudo e tags de todos os nós
  const matches = allNodes.filter(n => {
    const haystack = [
      n.titulo,
      n.conteudo,
      ...(n.tags || []),
    ].join(' ').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
    return haystack.includes(q);
  }).slice(0, 20);

  if (matches.length === 0) {
    box.innerHTML = `<div class="search-empty">Nenhum resultado para "${query}"</div>`;
  } else {
    box.innerHTML = matches.map(n => {
      const cfg = TIPOS[n.type] || { cor:'#555', label:'—' };
      // Label de exibição: WhatsApp mostra data em vez de nome
      const displayTitle = n.type === 'whatsapp'
        ? `WhatsApp ${n.status === 'followup' ? 'Follow-up' : 'Prospecção'} · ${n.data}`
        : n.titulo;
      return `<div class="search-item" onmousedown="focusNode('${n.id}')">
        <div class="search-item-dot" style="background:${cfg.cor}"></div>
        <div class="search-item-title">${displayTitle}</div>
        <div class="search-item-type">${cfg.label}</div>
      </div>`;
    }).join('');
  }

  box.classList.add('visible');
}

function onSearchFocus() {
  clearTimeout(searchBlurTimer);
  const q = document.getElementById('search-input').value;
  if (q.trim().length >= 2) document.getElementById('search-results').classList.add('visible');
}

function onSearchBlur() {
  // Pequeno delay para permitir o clique no resultado antes de fechar
  searchBlurTimer = setTimeout(() => {
    document.getElementById('search-results').classList.remove('visible');
  }, 200);
}

function focusNode(id) {
  const nodeData = allNodes.find(n => n.id === id);
  if (!nodeData || !simulation || !zoomBehavior) return;

  // Fecha busca
  document.getElementById('search-results').classList.remove('visible');
  document.getElementById('search-input').value = '';

  // Posição atual no grafo
  const simNode = simulation.nodes().find(n => n.id === id);
  if (simNode) {
    const W = window.innerWidth, H = window.innerHeight;
    const scale = 2;
    const tx = W / 2 - scale * simNode.x;
    const ty = H / 2 - scale * simNode.y;
    d3.select('#svg').transition().duration(700)
      .call(zoomBehavior.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
  }

  openPanel(nodeData);
  highlightNode(nodeData);
}

// Redimensionar
window.addEventListener('resize', () => {
  if (simulation) simulation.force('center', d3.forceCenter(window.innerWidth/2, window.innerHeight/2)).alpha(0.3).restart();
});

// Init
loadData();
